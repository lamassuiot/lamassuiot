name: Build and Deploy Lamassu Quantum Images
on:
  workflow_dispatch:
    branches:
      - lamassuq-legacy
jobs:
  build_docker_images:
    strategy:
      matrix:
        service: [kms, ca, devmanager, dmsmanager, va, alerts]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - run: |
          echo "SHA1VER=dev-$(git rev-parse HEAD)" >> $GITHUB_ENV
          
      - name: Login to Github Registry
        uses: docker/login-action@v3 
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.service }} DEV docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ci/pq_${{ matrix.service }}.dockerfile
          build-args: |
            BASE_IMAGE=alpine:3.14
            SHA1VER=${{ env.SHA1VER }}
            VERSION=dev
          tags: |
            ghcr.io/lamassuiot/lamassu-${{ matrix.service }}:pqc
          push: true


