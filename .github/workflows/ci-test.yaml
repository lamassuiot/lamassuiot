name: GO Unit Testing

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:
  
jobs:
  test:
    strategy:
      max-parallel: 5
      matrix:
        module: 
          - path: core
            tag: core
          - path: sdk
            tag: sdk
          - path: shared/subsystems 
            tag: shared-subsystems
          - path: shared/aws
            tag: shared-aws
          - path: shared/http
            tag: shared-http
          - path: engines/crypto/aws
            tag: crypto-aws
          - path: engines/crypto/filesystem
            tag: crypto-filesystem
          - path: engines/crypto/vaultkv2
            tag: crypto-vaultkv2
          - path: engines/eventbus/amqp
            tag: eventbus-amqp
          - path: engines/eventbus/aws
            tag: eventbus-aws
          - path: engines/storage/postgres
            tag: storage-postgres
          - path: connectors/awsiot
            tag: connector-awsiot
          - path: monolithic
            tag: monolithic
          
    name: ${{ matrix.module.path }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
 
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2' # The Go version to download (if necessary) and use.
          cache-dependency-path: "**/*.sum"
 
      - name: Install Dependencies
        working-directory: ${{ matrix.module.path }}
        run: go work sync

      - name: Run Golang Tests with coverage
        id: run
        working-directory: ${{ matrix.module.path }}
        run: |
          go run gotest.tools/gotestsum@latest --format github-actions ./... -coverpkg=./... -timeout 300s -coverprofile coverage.txt -covermode=atomic

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          commit_parent: ${{ github.event.pull_request.base.sha }}
          fail_ci_if_error: true
          verbose: true
          flags: ${{ matrix.module.tag }}
  test-pkcs11:
    name: engines/crypto/pkcs11
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2' # The Go version to download (if necessary) and use.
          cache-dependency-path: "**/*.sum"
      
      - name: Install PKCS11 Proxy Dependencies
        run: |
          wget https://github.com/Nitrokey/nethsm-pkcs11/releases/download/v2.2.0/nethsm-pkcs11-v2.2.0-x86_64-linux-glibc.so

      - name: Install Dependencies
        working-directory: engines/crypto/pkcs11
        run: go work sync

      - name: Run Golang Tests with coverage
        id: run
        working-directory: engines/crypto/pkcs11
        env:
          PKCS11_MODULE_PATH: ${{ github.workspace }}/nethsm-pkcs11-v2.2.0-x86_64-linux-glibc.so
        run: |
          go run gotest.tools/gotestsum@latest --format github-actions ./... -coverpkg=./... -timeout 1200s -coverprofile coverage.txt -covermode=atomic

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          commit_parent: ${{ github.event.pull_request.base.sha }}
          fail_ci_if_error: true
          verbose: true
          flags: crypto-pkcs11

  test-backend-assemblers:
    strategy:
      max-parallel: 5
      matrix:
        module:
          - path: backend/pkg/assemblers/tests/ca
            tag: backend-assemblers-ca
            name: CA
          - path: backend/pkg/assemblers/tests/kms
            tag: backend-assemblers-kms
            name: KMS
          - path: backend/pkg/assemblers/tests/va
            tag: backend-assemblers-va
            name: VA
          - path: backend/pkg/assemblers/tests/device-manager
            tag: backend-assemblers-device-manager
            name: Device Manager
          - path: backend/pkg/assemblers/tests/dms-manager
            tag: backend-assemblers-dms-manager
            name: DMS Manager
          - path: backend/pkg/assemblers/tests/alerts
            tag: backend-assemblers-alerts
            name: Alerts
    name: ${{ matrix.module.name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
 
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2'
          cache-dependency-path: "**/*.sum"
 
      - name: Install Dependencies
        working-directory: backend
        run: go work sync

      - name: Run Golang Tests with coverage
        id: run
        working-directory: ${{ matrix.module.path }}
        run: |
          go run gotest.tools/gotestsum@latest --format github-actions ./... -coverpkg=./... -timeout 900s -coverprofile coverage.txt -covermode=atomic

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          commit_parent: ${{ github.event.pull_request.base.sha }}
          fail_ci_if_error: true
          verbose: true
          flags: ${{ matrix.module.tag }}

  test-backend-rest:
    name: backend (excluding assemblers/tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2'
          cache-dependency-path: "**/*.sum"

      - name: Install Dependencies
        working-directory: backend
        run: go work sync

      - name: Run Golang Tests with coverage
        id: run
        working-directory: backend
        run: |
          go run gotest.tools/gotestsum@latest --format github-actions -- $(go list ./... | grep -v '/pkg/assemblers/tests') -coverpkg=./... -timeout 300s -coverprofile coverage.txt -covermode=atomic

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          commit_parent: ${{ github.event.pull_request.base.sha }}
          fail_ci_if_error: true
          verbose: true
          flags: backend-rest

  e2e-cmp:
    name: CMP E2E Tests
    runs-on: ubuntu-latest
    needs: [test, test-pkcs11, test-backend-assemblers, test-backend-rest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      # The CMP compliance suite is a separate upstream repo; it MUST be checked
      # out before any `working-directory: cmp-test-suite` step can run.
      - name: Checkout CMP test suite
        uses: actions/checkout@v5
        with:
          repository: siemens/cmp-test-suite
          path: cmp-test-suite

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2'
          cache-dependency-path: "**/*.sum"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install monolithic Go dependencies
        working-directory: monolithic
        run: go work sync

      # run-cmp-test-suite.sh handles the full flow against a clean full stack
      # (Postgres + RabbitMQ + WFX via Docker): applies the compat patch, seeds
      # config/lamassu.robot, creates the venv, waits for sample-cmp-dms to
      # exist, runs the CMP bootstrap, then executes the suite. --fresh-full
      # starts and tears down the dev server itself, so no separate start/wait
      # steps are needed. continue-on-error: the suite has known unsupported
      # cases; the uploaded report is the source of truth, not a green check.
      - name: Run CMP E2E test suite
        id: cmp
        continue-on-error: true
        env:
          SUITE_DIR: ${{ github.workspace }}/cmp-test-suite
        run: |
          bash scripts/run-cmp-test-suite.sh --fresh-full

      - name: Upload Robot Framework report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cmp-e2e-report
          path: cmp-test-suite/reports/