name: GO Unit Testing

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:
  
jobs:
  test:
    strategy:
      max-parallel: 5
      matrix:
        module: 
          - path: core
            tag: core
          - path: sdk
            tag: sdk
          - path: shared/subsystems 
            tag: shared-subsystems
          - path: shared/aws
            tag: shared-aws
          - path: shared/http
            tag: shared-http
          - path: engines/crypto/aws
            tag: crypto-aws
          - path: engines/crypto/filesystem
            tag: crypto-filesystem
          - path: engines/crypto/vaultkv2
            tag: crypto-vaultkv2
          - path: engines/eventbus/amqp
            tag: eventbus-amqp
          - path: engines/eventbus/aws
            tag: eventbus-aws
          - path: engines/storage/postgres
            tag: storage-postgres
          - path: connectors/awsiot
            tag: connector-awsiot
          - path: monolithic
            tag: monolithic
          
    name: ${{ matrix.module.path }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
 
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2' # The Go version to download (if necessary) and use.
          cache-dependency-path: "**/*.sum"
 
      - name: Install Dependencies
        working-directory: ${{ matrix.module.path }}
        run: go work sync

      - name: Run Golang Tests with coverage
        id: run
        working-directory: ${{ matrix.module.path }}
        run: |
          go run gotest.tools/gotestsum@latest --format github-actions ./... -coverpkg=./... -timeout 300s -coverprofile coverage.txt -covermode=atomic

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          commit_parent: ${{ github.event.pull_request.base.sha }}
          fail_ci_if_error: true
          verbose: true
          flags: ${{ matrix.module.tag }}
  test-pkcs11:
    name: engines/crypto/pkcs11
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2' # The Go version to download (if necessary) and use.
          cache-dependency-path: "**/*.sum"
      
      - name: Install PKCS11 Proxy Dependencies
        run: |
          wget https://github.com/Nitrokey/nethsm-pkcs11/releases/download/v2.2.0/nethsm-pkcs11-v2.2.0-x86_64-linux-glibc.so

      - name: Install Dependencies
        working-directory: engines/crypto/pkcs11
        run: go work sync

      - name: Run Golang Tests with coverage
        id: run
        working-directory: engines/crypto/pkcs11
        env:
          PKCS11_MODULE_PATH: ${{ github.workspace }}/nethsm-pkcs11-v2.2.0-x86_64-linux-glibc.so
        run: |
          go run gotest.tools/gotestsum@latest --format github-actions ./... -coverpkg=./... -timeout 1200s -coverprofile coverage.txt -covermode=atomic

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          commit_parent: ${{ github.event.pull_request.base.sha }}
          fail_ci_if_error: true
          verbose: true
          flags: crypto-pkcs11

  test-backend-assemblers:
    strategy:
      max-parallel: 5
      matrix:
        module:
          - path: backend/pkg/assemblers/tests/ca
            tag: backend-assemblers-ca
            name: CA
          - path: backend/pkg/assemblers/tests/kms
            tag: backend-assemblers-kms
            name: KMS
          - path: backend/pkg/assemblers/tests/va
            tag: backend-assemblers-va
            name: VA
          - path: backend/pkg/assemblers/tests/device-manager
            tag: backend-assemblers-device-manager
            name: Device Manager
          - path: backend/pkg/assemblers/tests/dms-manager
            tag: backend-assemblers-dms-manager
            name: DMS Manager
          - path: backend/pkg/assemblers/tests/alerts
            tag: backend-assemblers-alerts
            name: Alerts
    name: ${{ matrix.module.name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
 
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2'
          cache-dependency-path: "**/*.sum"
 
      - name: Install Dependencies
        working-directory: backend
        run: go work sync

      - name: Run Golang Tests with coverage
        id: run
        working-directory: ${{ matrix.module.path }}
        run: |
          go run gotest.tools/gotestsum@latest --format github-actions ./... -coverpkg=./... -timeout 900s -coverprofile coverage.txt -covermode=atomic

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          commit_parent: ${{ github.event.pull_request.base.sha }}
          fail_ci_if_error: true
          verbose: true
          flags: ${{ matrix.module.tag }}

  test-backend-rest:
    name: backend (excluding assemblers/tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2'
          cache-dependency-path: "**/*.sum"

      - name: Install Dependencies
        working-directory: backend
        run: go work sync

      - name: Run Golang Tests with coverage
        id: run
        working-directory: backend
        run: |
          go run gotest.tools/gotestsum@latest --format github-actions -- $(go list ./... | grep -v '/pkg/assemblers/tests') -coverpkg=./... -timeout 300s -coverprofile coverage.txt -covermode=atomic

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          commit_parent: ${{ github.event.pull_request.base.sha }}
          fail_ci_if_error: true
          verbose: true
          flags: backend-rest

  e2e-cmp:
    name: CMP E2E Tests
    runs-on: ubuntu-latest
    needs: [test, test-pkcs11, test-backend-assemblers, test-backend-rest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.2'
          cache-dependency-path: "**/*.sum"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply Lamassu compatibility patches to cmp-test-suite
        working-directory: cmp-test-suite
        run: |
          git apply ../.github/patches/cmp-test-suite/0001-lamassu-compat.patch

      - name: Create Python venv and install dependencies
        working-directory: cmp-test-suite
        run: |
          python -m venv venv-cmp-tests
          source venv-cmp-tests/bin/activate
          pip install --quiet uv
          uv pip install -e .

      - name: Install monolithic Go dependencies
        working-directory: monolithic
        run: go work sync

      - name: Start Lamassu monolithic server
        working-directory: monolithic
        run: |
          go run ./cmd/development/main.go --sample-data &
          echo $! > /tmp/lamassu.pid

      - name: Wait for Lamassu to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/ca/v1/cas > /dev/null 2>&1; then
              echo "Lamassu is ready"
              exit 0
            fi
            echo "Waiting for Lamassu... attempt $i"
            sleep 5
          done
          echo "Lamassu failed to start" >&2
          exit 1

      - name: Run CMP bootstrap setup
        run: |
          mkdir -p /tmp/cmp-bootstrap
          bash scripts/cmp-bootstrap-setup.sh http://localhost:8080 sample-cmp-dms /tmp/cmp-bootstrap

      - name: Run CMP tests
        working-directory: cmp-test-suite
        run: |
          source venv-cmp-tests/bin/activate
          robot --pythonpath=./ --exclude verbose-tests --exclude pqc \
            --outputdir=reports \
            --variable environment:lamassu \
            tests/

      - name: Upload Robot Framework report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cmp-e2e-report
          path: cmp-test-suite/reports/