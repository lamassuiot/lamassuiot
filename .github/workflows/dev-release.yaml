name: "DEV Release Workflow: (ONLY creates docker images with dev tag)"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (leave blank to use 'dev'). Cannot be 'latest' or start with a number."
        required: false
        default: ""

jobs:
  validate_tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag input
        run: |
          TAG="${{ github.event.inputs.tag }}"
          TAG="${TAG:-dev}"

          # Disallow reserved tag
          if [[ "${TAG,,}" == "latest" ]]; then
            echo "Error: tag 'latest' is not allowed." >&2
            exit 1
          fi

          # Docker tag allowlist + prevents newline/env injection
          if ! [[ "$TAG" =~ ^[A-Za-z_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Error: tag must match ^[A-Za-z_][A-Za-z0-9_.-]{0,127}$ (got '$TAG')." >&2
            exit 1
          fi

          printf 'TAG=%s\n' "$TAG" >> "$GITHUB_ENV"

  build_docker_image:
    needs: validate_tag
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          [
            kms,
            ca,
            devmanager,
            dmsmanager,
            va,
            alerts,
            aws-connector,
            authz,
            lamassu-db-migration,
            ca-to-kms-migration,
            monolithic,
          ]
    name: ${{ matrix.service }} - Release docker images
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Resolve tag
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          TAG="${INPUT_TAG:-dev}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "SHA1VER=${TAG}-$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Login to Github Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ matrix.service }} DEV docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ci/${{ matrix.service }}.dockerfile
          build-args: |
            BASE_IMAGE=alpine:3.14
            SHA1VER=${{ env.SHA1VER }}
            VERSION=${{ env.TAG }}
          tags: |
            ghcr.io/lamassuiot/lamassu-${{ matrix.service }}:${{ env.TAG }}
          push: true
