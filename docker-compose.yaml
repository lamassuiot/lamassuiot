services:
  # The VictoriaLogs Database
  victorialogs:
    image: victoriametrics/victoria-logs:latest # Use latest stable version
    container_name: victorialogs
    command:
      - "-storageDataPath=/vlogs-data"
      - "-httpListenAddr=:9428"
    volumes:
      - vlogs-data:/vlogs-data
    ports:
      - "9428:9428"
    # We do NOT expose 9428 to the host to ensure all traffic goes through the CORS fix

  # The CORS Fix (Nginx)
  proxy:
    image: nginx:alpine
    container_name: cors-fix-proxy
    ports:
      - "7777:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - victorialogs

volumes:
  vlogs-data: